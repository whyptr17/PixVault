name: PixVault CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8' # Matching user's local version
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Print SHA-1 Fingerprint (for Firebase)
        run: cd android && ./gradlew signingReport

      - name: Build APK
        run: flutter build apk --release --dart-define=IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }} --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixvault-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
